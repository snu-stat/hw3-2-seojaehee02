name: Quarto Publish (R & Custom Packages)

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: r-reticulate
          channels: conda-forge,defaults
          channel-priority: strict

      - name: Install Python dependencies via Conda
        run: |
          conda install -y -n r-reticulate -c conda-forge --override-channels numpy pandas matplotlib scipy statsmodels
          # 추가로 필요한 패키지 설치
          conda install -y -n r-reticulate -c conda-forge --override-channels pip libexpat
          conda run -n r-reticulate pip install pylahman
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c(
            "reticulate",
            "knitr",
            "rmarkdown"
          ))
          # 추가로 필요한 패키지 설치
          install.packages(c(
            "tidyverse",
            "NHANES",
            "Lahman"
          ))
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          export CONDA_PREFIX=$(conda info --base)/envs/r-reticulate
          export RETICULATE_PYTHON=$CONDA_PREFIX/bin/python
          export LD_LIBRARY_PATH=$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}
          export LD_PRELOAD=$CONDA_PREFIX/lib/libexpat.so.1
          quarto render
        shell: bash -l {0}

      - name: Prepare Binder Assets
        run: |
          cp _site/hw03.ipynb hw03.ipynb
          cp Dockerfile _site/Dockerfile

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
